<div id="NexrollConfigPage" data-role="page" class="page type-interior pluginConfigurationPage"
     data-require="emby-input,emby-button,emby-checkbox">

    <div data-role="content">
        <div class="content-primary">

            <h2 class="sectionTitle">NeXroll Intros</h2>
            <p class="fieldDescription">
                This plugin is automatically configured by your NeXroll server.
                Preroll intros are injected before movies and episodes based on your NeXroll schedules.
            </p>

            <div id="NexrollConfigForm">

                <!-- Connection Status (read-only) -->
                <div id="connectionStatus" style="padding: 1em; border-radius: 6px; margin-bottom: 1.5em;"></div>

                <!-- Media Type Toggles -->
                <h3 class="sectionTitle">Playback Options</h3>

                <div class="checkboxContainer checkboxContainer-withDescription">
                    <label>
                        <input is="emby-checkbox" id="chkMovies" type="checkbox" />
                        <span>Enable intros for Movies</span>
                    </label>
                </div>

                <div class="checkboxContainer checkboxContainer-withDescription">
                    <label>
                        <input is="emby-checkbox" id="chkEpisodes" type="checkbox" />
                        <span>Enable intros for Episodes</span>
                    </label>
                </div>

                <div class="inputContainer">
                    <label class="inputLabel" for="txtMaxIntros">Max Intros Per Playback</label>
                    <input is="emby-input" id="txtMaxIntros" type="number" min="0"
                           placeholder="0 = unlimited" />
                    <div class="fieldDescription">
                        Maximum number of intros to play before each item. 0 means use all from NeXroll.
                    </div>
                </div>

                <!-- Save -->
                <div style="margin-top: 1.5em;">
                    <button is="emby-button" type="button" id="btnSave"
                            class="raised button-submit block emby-button">
                        <span>Save</span>
                    </button>
                </div>
                <div id="saveResult" style="margin-top: 0.8em; font-weight: 600; padding: 0.5em 0;"></div>

            </div>
        </div>
    </div>

    <script type="text/javascript">
        /* NeXroll config page v7 */
        (function () {
            var PLUGIN_ID = 'a1b2c3d4-e5f6-7890-abcd-ae0c01100001';
            var _saving = false;

            /* ---------- API helpers using XMLHttpRequest ---------- */
            function getToken() {
                var t = '';
                try { t = ApiClient.accessToken(); } catch(e) {}
                if (!t) try { t = ApiClient._serverInfo.AccessToken; } catch(e) {}
                if (!t) try { t = window.ApiClient._serverInfo.AccessToken; } catch(e) {}
                return t;
            }

            function baseUrl() {
                var b = '';
                try { b = ApiClient.serverAddress(); } catch(e) {}
                if (!b) b = window.location.origin;
                return b;
            }

            function cfgUrl() {
                return baseUrl() + '/Plugins/' + PLUGIN_ID + '/Configuration';
            }

            function xhrGet(url, callback) {
                var xhr = new XMLHttpRequest();
                xhr.open('GET', url, true);
                var tk = getToken();
                if (tk) xhr.setRequestHeader('Authorization', 'MediaBrowser Token="' + tk + '"');
                xhr.onload = function() {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        try { callback(null, JSON.parse(xhr.responseText)); } catch(e) { callback(e); }
                    } else {
                        callback(new Error('GET ' + xhr.status));
                    }
                };
                xhr.onerror = function() { callback(new Error('GET network error')); };
                xhr.send();
            }

            function xhrPost(url, data, callback) {
                var xhr = new XMLHttpRequest();
                xhr.open('POST', url, true);
                var tk = getToken();
                if (tk) xhr.setRequestHeader('Authorization', 'MediaBrowser Token="' + tk + '"');
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.onload = function() {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        callback(null);
                    } else {
                        callback(new Error('POST ' + xhr.status));
                    }
                };
                xhr.onerror = function() { callback(new Error('POST network error')); };
                xhr.send(JSON.stringify(data));
            }

            /* ---------- UI helpers ---------- */
            function showResult(msg, color) {
                var el = document.querySelector('#saveResult');
                if (el) {
                    el.style.color = color;
                    el.textContent = msg;
                }
            }

            function applyConfig(cfg) {
                var el;
                el = document.querySelector('#chkMovies');
                if (el) el.checked = cfg.EnableForMovies !== false;
                el = document.querySelector('#chkEpisodes');
                if (el) el.checked = cfg.EnableForEpisodes !== false;
                el = document.querySelector('#txtMaxIntros');
                if (el) el.value = (typeof cfg.MaxIntros === 'number') ? cfg.MaxIntros : 0;

                var st = document.querySelector('#connectionStatus');
                if (!st) return;
                var url = cfg.NexrollUrl || '';
                if (url) {
                    st.style.background = 'rgba(39,174,96,0.12)';
                    st.style.border = '1px solid rgba(39,174,96,0.3)';
                    st.textContent = '';
                    var ok = document.createElement('span');
                    ok.style.cssText = 'color:#27ae60;font-size:1.1em;font-weight:600;';
                    ok.textContent = '\u2714 Connected to NeXroll';
                    var srv = document.createElement('span');
                    srv.style.cssText = 'color:#999;font-size:0.9em;';
                    srv.textContent = 'Server: ' + url;
                    st.appendChild(ok);
                    st.appendChild(document.createElement('br'));
                    st.appendChild(srv);
                } else {
                    st.style.background = 'rgba(231,76,60,0.12)';
                    st.style.border = '1px solid rgba(231,76,60,0.3)';
                    st.textContent = '';
                    var fail = document.createElement('span');
                    fail.style.cssText = 'color:#e74c3c;font-size:1.1em;font-weight:600;';
                    fail.textContent = '\u2718 Not Connected';
                    var hint = document.createElement('span');
                    hint.style.cssText = 'color:#999;font-size:0.9em;';
                    hint.textContent = 'Open your NeXroll dashboard and connect Jellyfin.';
                    st.appendChild(fail);
                    st.appendChild(document.createElement('br'));
                    st.appendChild(hint);
                }
            }

            /* ---------- load ---------- */
            function loadConfig() {
                if (_saving) return;
                xhrGet(cfgUrl(), function(err, cfg) {
                    if (err) return;
                    if (!_saving) applyConfig(cfg);
                });
            }

            /* ---------- save ---------- */
            function saveConfig() {
                showResult('Saving...', '#999');
                _saving = true;

                var movies, episodes, maxIntros;
                try {
                    movies   = !!document.querySelector('#chkMovies').checked;
                    episodes = !!document.querySelector('#chkEpisodes').checked;
                    var raw  = document.querySelector('#txtMaxIntros').value;
                    maxIntros = parseInt(raw, 10);
                    if (isNaN(maxIntros) || maxIntros < 0) maxIntros = 0;
                } catch(e) {
                    showResult('Form read error: ' + e, '#e74c3c');
                    _saving = false;
                    return;
                }
                /* Step 1: GET current config */
                xhrGet(cfgUrl(), function(err, cfg) {
                    if (err) {
                        showResult('Load failed: ' + err, '#e74c3c');
                        _saving = false;
                        return;
                    }
                    /* Step 2: Merge and POST */
                    cfg.EnableForMovies  = movies;
                    cfg.EnableForEpisodes = episodes;
                    cfg.MaxIntros = maxIntros;
                    xhrPost(cfgUrl(), cfg, function(err2) {
                        if (err2) {
                            showResult('Save failed: ' + err2, '#e74c3c');
                            _saving = false;
                            return;
                        }
                        /* Step 3: Verify */
                        xhrGet(cfgUrl(), function(err3, saved) {
                            _saving = false;
                            if (err3) {
                                showResult('Verify failed: ' + err3, '#e74c3c');
                                return;
                            }
                            applyConfig(saved);
                            showResult('\u2714 Saved \u2014 Max Intros: ' + saved.MaxIntros, '#27ae60');
                        });
                    });
                });
            }

            /* ---------- wire events ---------- */
            var page = document.querySelector('#NexrollConfigPage');
            if (page) {
                page.addEventListener('pageshow', function() { loadConfig(); });
                page.addEventListener('viewshow', function() { loadConfig(); });
            }

            var btn = document.querySelector('#btnSave');
            if (btn) {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    saveConfig();
                });
            }

            /* Initial load */
            setTimeout(loadConfig, 300);
        })();
    </script>

</div>
