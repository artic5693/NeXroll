name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'NeXroll/**'
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'requirements.txt'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.12.0) - leave empty for dev build'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/artic5693/nexroll

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # SAFETY: Only run on the artic5693 fork, never on upstream
    if: github.repository == 'artic5693/NeXroll'
    permissions:
      contents: read
      packages: write

    steps:
      # SAFETY: Abort if somehow running on the wrong repo
      - name: Verify repository ownership
        run: |
          if [ "${{ github.repository }}" != "artic5693/NeXroll" ]; then
            echo "ERROR: This workflow must only run on artic5693/NeXroll, not ${{ github.repository }}"
            exit 1
          fi

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_VERSION="${{ github.event.inputs.version }}"
            if [ -z "$INPUT_VERSION" ]; then
              VERSION="dev"
              IS_DEV="true"
            else
              VERSION="$INPUT_VERSION"
              IS_DEV="false"
            fi
          else
            VERSION="dev"
            IS_DEV="true"
          fi
          VERSION_NUM="${VERSION#v}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          echo "version=${VERSION_NUM}" >> $GITHUB_OUTPUT
          echo "tag=${VERSION}" >> $GITHUB_OUTPUT
          echo "is_dev=${IS_DEV}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: NeXroll/frontend/package-lock.json

      - name: Build frontend
        working-directory: NeXroll/frontend
        env:
          CI: false
        run: |
          npm ci
          npm run build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Docker tags
        id: docker_tags
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IS_DEV="${{ steps.version.outputs.is_dev }}"
          SHORT_SHA="${{ steps.version.outputs.short_sha }}"

          if [ "$IS_DEV" = "true" ]; then
            echo "tags=${{ env.IMAGE_NAME }}:dev,${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "tags=${{ env.IMAGE_NAME }}:${VERSION},${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          build-args: |
            VERSION=${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
